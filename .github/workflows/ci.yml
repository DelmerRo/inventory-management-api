name: CI-CD Spring Boot

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .   # Cambia a '.' si tu código está en la raíz

    steps:
      # Clonar repositorio
      - uses: actions/checkout@v4

      # Configurar Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Construir proyecto Maven (sin tests)
      - name: Build
        run: mvn clean package -DskipTests

      # Subir artefacto solo desde main
      - name: Upload Artifact (only main)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar

      # Desplegar a Render solo desde main
      - name: Deploy to Render (only main)
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"