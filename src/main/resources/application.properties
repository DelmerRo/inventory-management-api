# ===============================
# Application
# ===============================
spring.application.name=${APP_NAME:utama-inventory}
server.port=${APP_PORT:9092}
server.error.include-message=always
server.error.include-binding-errors=always

# ===============================
# Database - PostgreSQL (Mejorado)
# ===============================
# ? Agregado useUnicode y characterEncoding para soportar þ, tildes y caracteres especiales
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:utama_inventory}?useUnicode=true&characterEncoding=UTF-8&sslmode=disable
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ? Pool de conexiones Hikari (mejor rendimiento)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.connection-init-sql=SET NAMES 'UTF8'
spring.datasource.hikari.data-source-properties.stringtype=unspecified

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ? Mejoras adicionales de Hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ===============================
# Jackson
# ===============================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Argentina/Buenos_Aires
spring.jackson.default-property-inclusion=non_null

# ===============================
# Logging
# ===============================
logging.level.com.utama.my_inventory=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.dateformat=HH:mm:ss
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%thread]){faint} %clr(%-40.40logger{39}){cyan} %m%n
logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
spring.main.banner-mode=off

# ===============================
# Cloudinary
# ===============================
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api.key=${CLOUDINARY_API_KEY:}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:}

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:ut4m4S3cr3tK3yF0rInV3nt0ryM4n4g3m3nt2025!}
jwt.expiration=${JWT_EXPIRATION:1440}

# ===============================
# Security
# ===============================
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# ===============================
# CORS
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs

# Configuraciones adicionales para Swagger
springdoc.swagger-ui.csrf.enabled=false
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# ===============================
# Environment
# ===============================
app.environment=${APP_ENV:local}