# ===============================
# Application
# ===============================
spring.application.name=${APP_NAME:utama-inventory}
server.port=${APP_PORT:9092}

# ===============================
# Database - PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory_utama_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# ===============================
# Jackson
# ===============================
spring.jackson.date-format=dd-MM-yyyy HH:mm:ss
spring.jackson.time-zone=America/Argentina/Buenos_Aires

# ===============================
# Logging
# ===============================
logging.pattern.dateformat=HH:mm
spring.main.banner-mode=off

# ===============================
# Cloudinary
# ===============================
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.key=${CLOUDINARY_API_KEY}
cloudinary.api.secret=${CLOUDINARY_API_SECRET}
